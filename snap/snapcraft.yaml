name: linux-photo-booth
version: '1.0.0'
summary: Professional photo booth application for Ubuntu Core
description: |
  A professional photo booth application designed for Ubuntu Core and Ubuntu Frame.
  Perfect for events, parties, and commercial photo booth installations.

  Features:
  - Real-time camera capture using GStreamer
  - Multiple photo layouts (1x1, 2x2)
  - Frame overlay system with customizable templates
  - Direct printing via CUPS
  - Countdown timer with visual feedback
  - Touch-optimized interface
  - Automatic kiosk mode with Ubuntu Frame
  - Background themes and customization
  - Remote management capabilities

grade: stable
confinement: strict
base: core24

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [arm64]
    build-for: [arm64]

plugs:
  gpu-2404:
    interface: content
    target: $SNAP/gpu-2404
    default-provider: mesa-2404

slots:
  dbus-linux-photo-booth:
    interface: dbus
    bus: session
    name: com.test.linux_photo_booth

apps:
  linux-photo-booth:
    command: bin/run-booth
    command-chain:
      - bin/gpu-2404-wrapper
    extensions: [gnome]
    plugs:
      - camera
      - cups-control
      - network
      - network-bind
      - audio-playback
      - raw-usb
    slots:
      - dbus-linux-photo-booth
    desktop: usr/share/applications/linux-photo-booth.desktop
    environment:
      FLUTTER_ENGINE_RUNTIME_MODE: release
      FLUTTER_ENGINE_SWITCH_TO_IMPELLER: "0"
      GTK_A11Y: "none"
      GDK_BACKEND: "wayland,x11"
      TMPDIR: "$SNAP_USER_COMMON"
      NO_PROXY: "localhost,127.0.0.1"
      MALLOC_TRIM_THRESHOLD_: "100000"

  photo-booth-server:
    command: bin/server.py
    plugs:
      - cups-control
      - network
      - network-bind
    daemon: simple
    restart-condition: always
    restart-delay: 5s

parts:
  flutter-app:
    plugin: flutter
    source: .
    flutter-target: lib/main.dart
    override-build: |
      # Remove problematic pubspec.lock to avoid platform conflicts
      rm -f pubspec.lock

      # Run default flutter build
      craftctl default
    build-packages:
      - libgtk-3-dev
      - libgstreamer1.0-dev
      - libgstreamer-plugins-base1.0-dev
      - libv4l-dev
      - libcups2-dev
    stage-packages:
      - bash
      - coreutils
      - libgstreamer1.0-0
      - libgstreamer-plugins-base1.0-0
      - gstreamer1.0-plugins-good
      - gstreamer1.0-plugins-bad
      - gstreamer1.0-libav
      - gstreamer1.0-pulseaudio
      - gstreamer1.0-alsa
      - libv4l-0
      - v4l-utils
      - libcups2
      - dmz-cursor-theme
      - adwaita-icon-theme

  python-server:
    plugin: python
    source: .
    python-requirements:
      - requirements.txt
    stage-packages:
      - cups
      - cups-client
    override-build: |
      craftctl default
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp server.py $SNAPCRAFT_PART_INSTALL/bin/server.py
      chmod +x $SNAPCRAFT_PART_INSTALL/bin/server.py

  desktop-file:
    plugin: dump
    source: snap/local/desktop/
    organize:
      linux-photo-booth.desktop: usr/share/applications/linux-photo-booth.desktop

  launcher:
    plugin: dump
    source: snap/local/
    organize:
      run-booth: bin/run-booth

  gpu-2404:
    after: [flutter-app]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    organize:
      bin/gpu-2404-wrapper: bin/gpu-2404-wrapper
    stage:
      - bin/gpu-2404-wrapper

  config:
    plugin: dump
    source: ubuntu-core/
    organize:
      setup-ubuntu-core.sh: usr/local/bin/setup-ubuntu-core.sh
